name: Deploy docs

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Rewrite git+ssh deps to https
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm docs:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: docs/.vitepress/dist
          retention-days: 7

      - name: Ensure Cloudflare Pages project exists
        if: ${{ vars.DEPLOY_TO_CLOUDFLARE == 'true' }}
        continue-on-error: true  # safe to ignore — it just means the project already exists
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages project create agentx-docs --production-branch=master

      - name: Deploy to Cloudflare Pages
        if: ${{ vars.DEPLOY_TO_CLOUDFLARE == 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: >-
            pages deploy docs/.vitepress/dist
            --project-name=agentx-docs
            --branch=${{ github.head_ref || github.ref_name }}
            --commit-dirty=true
